<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - React</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.20.7/babel.min.js"></script>


    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState } = React;

        function App() {
            const [personas, setPersonas] = useState([]);
            const [form, setForm] = useState({ nombre: "", apellido: "", edad: "", altura: "", peso: "" });

            const agregar = e => {
                e.preventDefault();

                const alturaNum = parseFloat(form.altura);
                const pesoNum = parseFloat(form.peso);

                // Convertir altura tipo Ejercicio 2: 177 → 1.77
                const alturaM = alturaNum > 3 ? alturaNum / 100 : alturaNum;

                const imc = (pesoNum / (alturaM * alturaM)).toFixed(2);

                setPersonas([...personas, { ...form, altura: alturaM, peso: pesoNum, id: Date.now(), imc }]);

                setForm({ nombre: "", apellido: "", edad: "", altura: "", peso: "" });
            };


            const eliminar = id => setPersonas(personas.filter(p => p.id !== id));

            return (
                <div>
                    <h1>Ejercicio 3: Personas (React)</h1>

                    <nav>
                        <a href="index.html">Volver al Inicio</a>
                    </nav>

                    <h2>Cargar personas</h2>

                    <form onSubmit={agregar}>
                        <input
                            placeholder="Nombre"
                            type="text"
                            value={form.nombre}
                            onChange={e => setForm({ ...form, nombre: e.target.value })}
                            required
                        />
                        <input
                            placeholder="Apellido"
                            type="text"
                            value={form.apellido}
                            onChange={e => setForm({ ...form, apellido: e.target.value })}
                            required
                        />
                        <input
                            placeholder="Edad"
                            type="number"
                            value={form.edad}
                            onChange={e => setForm({ ...form, edad: e.target.value })}
                            required
                        />
                        <input
                            placeholder="Altura (m)"
                            type="number"
                            value={form.altura}
                            onChange={e => setForm({ ...form, altura: e.target.value })}
                            required
                        />
                        <input
                            placeholder="Peso (kg)"
                            type="number"
                            value={form.peso}
                            onChange={e => setForm({ ...form, peso: e.target.value })}
                            required
                        />
                        <button>Agregar</button>
                    </form>

                    <h2>Personas Cargadas</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th><th>Apellido</th><th>Edad</th>
                                <th>Altura (m)</th><th>Peso (kg)</th><th>IMC</th><th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {personas.map(p => (
                                <tr key={p.id}>
                                    <td>{p.nombre}</td>
                                    <td>{p.apellido}</td>
                                    <td>{p.edad}</td>
                                    <td>{p.altura}</td>
                                    <td>{p.peso}</td>
                                    <td>{p.imc}</td>
                                    <td><button onClick={() => eliminar(p.id)}>Eliminar</button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    </script>

</body>

</html>
